name: CI

# Thin caller — all CI logic lives in the shared reusable workflow.
# Single source of truth: RazorBackRoar/.razorcore/.github/workflows/app-ci.yml
# To add a coverage gate, pass `coverage-package:` and `coverage-min:` below.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    uses: RazorBackRoar/.razorcore/.github/workflows/app-ci.yml@main
    with:
      app-name: Structura
